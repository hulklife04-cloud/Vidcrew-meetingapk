<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#E63B2E"/>
<title></title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root{
  --red:#E63B2E;--gold:#C9A84C;--green:#2ECC71;--blue:#3B8BEB;
  --bg:#0c0c0e;--bg2:#161618;--bg3:#1e1e21;--bg4:#252528;
  --border:rgba(255,255,255,0.1);--text:#f0f0f2;
  --muted:rgba(240,240,242,0.5);--muted2:rgba(240,240,242,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.screen{display:none;width:100%;height:100%;flex-direction:column;}
.screen.active{display:flex;}
#lobby{width:100%;height:100%;overflow-y:auto;padding:12px 16px 20px;gap:10px;display:flex;flex-direction:column;align-items:stretch;background:var(--bg);}
.lobby-header{display:flex;align-items:center;gap:12px;}
.vc-logo{width:48px;height:48px;background:var(--red);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;box-shadow:0 0 20px rgba(230,59,46,.3);flex-shrink:0;}
.lobby-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;line-height:1;}
.lobby-title span{color:var(--red);}
.lobby-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.cam-box{width:100%;height:160px;background:var(--bg3);border-radius:16px;overflow:hidden;position:relative;border:1px solid var(--border);}
.cam-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.cam-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cam-placeholder span{font-size:36px;}
.cam-placeholder p{font-size:13px;color:var(--muted);text-align:center;padding:0 16px;}
.allow-btn{background:var(--red);color:white;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;}
.cam-lbl{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.6);border-radius:6px;padding:2px 8px;font-size:12px;}
.cam-ctrls{position:absolute;bottom:8px;right:8px;display:flex;gap:6px;}
.cctrl{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:white;font-size:14px;cursor:pointer;}
.cctrl.off{background:rgba(230,59,46,.75);}
.flabel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block;}
.finput{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;}
.finput:focus{border-color:rgba(230,59,46,.6);outline:none;}
.finput::placeholder{color:var(--muted2);}
.role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.role-card{background:var(--bg3);border:2px solid var(--border);border-radius:12px;padding:8px 6px;text-align:center;cursor:pointer;}
.role-card.active{border-color:var(--red);background:rgba(230,59,46,.1);}
.role-icon{font-size:22px;display:block;margin-bottom:4px;}
.role-name{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;}
.role-card.active .role-name{color:var(--red);}
.divider{display:flex;align-items:center;gap:10px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:11px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;}
.join-row{display:flex;gap:8px;}
.join-input{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;}
.btn-join{background:var(--bg4);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;}
.btn-red{width:100%;background:var(--red);border:none;border-radius:14px;padding:14px;color:white;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;}
.btn-red:active{transform:scale(.98);}
.code-box{display:none;background:var(--bg3);border:1.5px solid rgba(201,168,76,.3);border-radius:12px;padding:10px 14px;margin-top:2px;}
.code-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
.code-val{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;color:var(--gold);}
.code-copy{font-size:11px;color:var(--muted);margin-top:4px;cursor:pointer;}
#room{height:100%;overflow:hidden;background:var(--bg);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--border);}
.tb-l{display:flex;align-items:center;gap:8px;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;}
.tb-title em{color:var(--red);font-style:normal;}
.tb-r{display:flex;align-items:center;gap:6px;}
.tb-timer{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);}
.tb-code{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--gold);font-family:'Bebas Neue',sans-serif;letter-spacing:2px;}
.tb-code strong{font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--gold);}
.pcount{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--green);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.vzone{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.vgrid{flex:1;display:grid;gap:4px;padding:4px;min-height:0;overflow:hidden;}
.vgrid.g1{grid-template-columns:1fr;}
.vgrid.g2{grid-template-columns:1fr 1fr;}
.vgrid.g3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.vgrid.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.vtile{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;}
.vtile.local{border-color:rgba(230,59,46,.25);}
.vtile video{width:100%;height:100%;object-fit:cover;}
.vtile video.hidden{display:none;}
.vtile-av{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:28px;}
.vtile-av.hidden{display:none;}
.vtile-lbl{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.7);border-radius:6px;padding:2px 8px;font-size:11px;display:flex;align-items:center;gap:4px;}
.vtile-muted{position:absolute;top:6px;right:6px;background:rgba(230,59,46,.85);border-radius:50%;width:22px;height:22px;display:none;align-items:center;justify-content:center;font-size:11px;}
.vtile-muted.show{display:flex;}
.rchip{font-size:9px;padding:1px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;}
.rchip.client{background:rgba(201,168,76,.25);color:var(--gold);}
.rchip.editor{background:rgba(59,139,235,.25);color:var(--blue);}
.rchip.admin{background:rgba(230,59,46,.25);color:var(--red);}
.scrtile video{object-fit:contain!important;}
.stop-scr{position:absolute;top:6px;right:6px;background:var(--red);color:white;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;}
.sharebar{display:none;align-items:center;justify-content:center;gap:8px;padding:4px 12px;background:rgba(230,59,46,.15);border-top:1px solid rgba(230,59,46,.3);font-size:12px;color:var(--red);}
.sharebar.on{display:flex;}
.rec-pill{display:none;align-items:center;gap:4px;background:rgba(230,59,46,.12);border:1px solid rgba(230,59,46,.3);border-radius:20px;padding:2px 10px;font-size:11px;}
.rec-pill.on{display:flex;}
.reddot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.controls{display:flex;flex-direction:row;align-items:center;justify-content:space-around;padding:8px 4px 12px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;}
.cbtn{width:48px;height:48px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cbtn.off{background:rgba(230,59,46,.15);border-color:rgba(230,59,46,.5);color:var(--red);}
.cbtn.on{background:rgba(46,204,113,.15);border-color:rgba(46,204,113,.5);}
.cbtn.end{background:var(--red);border-color:var(--red);}
.ctrl-lbl{font-size:8px;color:var(--muted);letter-spacing:.3px;}
.ubadge{position:absolute;top:-4px;right:-4px;background:var(--red);border-radius:50%;width:14px;height:14px;font-size:8px;display:none;align-items:center;justify-content:center;}
.ubadge.show{display:flex;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;}
.overlay.show{display:block;}
.panel{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .3s ease;max-height:70vh;display:flex;flex-direction:column;}
.panel.open{transform:translateY(0);}
.phandle{width:32px;height:4px;background:var(--border);border-radius:4px;margin:10px auto 0;}
.ptop{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);}
.ptop h4{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;}
.pclose{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.cmsg{display:flex;flex-direction:column;gap:2px;max-width:85%;}
.cmsg.me{align-self:flex-end;}
.cmsg.sys{align-self:center;max-width:100%;}
.cmeta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);}
.csender{font-weight:600;color:var(--text);}
.cbubble{background:var(--bg3);border:1px solid var(--border);border-radius:12px;border-top-left-radius:4px;padding:8px 12px;font-size:13px;line-height:1.4;}
.cmsg.me .cbubble{background:rgba(230,59,46,.2);border-color:rgba(230,59,46,.3);border-top-right-radius:4px;border-top-left-radius:12px;}
.cmsg.sys .cbubble{background:transparent;border:none;font-size:11px;color:var(--muted);text-align:center;}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);}
.chat-ta{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;resize:none;height:40px;max-height:100px;}
.chat-ta:focus{outline:none;border-color:rgba(230,59,46,.5);}
.chat-send{background:var(--red);border:none;border-radius:10px;padding:0 14px;color:white;font-size:16px;cursor:pointer;}
.plist{padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.pitem{display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg3);border-radius:10px;}
.pav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;flex-shrink:0;}
.pinfo{flex:1;}
.pname{font-size:13px;font-weight:600;}
.prole{font-size:11px;color:var(--muted);text-transform:capitalize;}
.youtag{font-size:10px;background:rgba(230,59,46,.2);color:var(--red);border-radius:4px;padding:2px 6px;}
.inv-modal{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(0,0,0,.7);}
.inv-modal.show{display:flex;}
.inv-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;width:90%;max-width:340px;text-align:center;}
.inv-box h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:16px;}
.inv-code{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:8px;color:var(--gold);margin:8px 0;}
.inv-link{margin-top:10px;word-break:break-all;font-size:11px;color:var(--muted);line-height:1.5;}
.inv-btns{display:flex;gap:8px;margin-top:16px;}
.inv-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;}
.inv-btn.red{background:var(--red);border-color:var(--red);}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="lobby" class="screen active">
  <div class="lobby-header">
    <div class="vc-logo">VC</div>
    <div class="lobby-title">VIDCREW <span>MEET</span><div class="lobby-sub">REAL-TIME COLLABORATION</div></div>
  </div>

  <div class="cam-box">
    <video id="prev-vid" autoplay playsinline muted></video>
    <div class="cam-placeholder" id="cam-placeholder">
      <span>📷</span>
      <p>Tap to allow camera</p>
      <button class="allow-btn" onclick="requestCam()">Allow Camera</button>
    </div>
    <div class="cam-lbl">PREVIEW</div>
    <div class="cam-ctrls">
      <button class="cctrl" id="prev-mic-btn" onclick="prevToggleMic()">🎙️</button>
      <button class="cctrl" id="prev-cam-btn" onclick="prevToggleCam()">📷</button>
    </div>
  </div>

  <div>
    <label class="flabel">YOUR NAME</label>
    <input class="finput" id="lf-name" placeholder="e.g. Romit" maxlength="24"/>
  </div>

  <div>
    <label class="flabel">YOUR ROLE</label>
    <div class="role-grid">
      <div class="role-card active" data-role="client">
        <span class="role-icon">🎬</span>
        <div class="role-name">CLIENT</div>
      </div>
      <div class="role-card" data-role="editor">
        <span class="role-icon">✂️</span>
        <div class="role-name">EDITOR</div>
      </div>
      <div class="role-card" data-role="admin">
        <span class="role-icon">👑</span>
        <div class="role-name">ADMIN</div>
      </div>
    </div>
  </div>

  <button class="btn-red" onclick="createRoom()">⚡ CREATE NEW ROOM</button>

  <div class="code-box" id="code-box">
    <div class="code-lbl">ROOM CODE</div>
    <div class="code-val" id="code-val"></div>
    <div class="code-copy" onclick="copyText(document.getElementById('code-val').textContent)">📋 Tap to copy</div>
  </div>

  <div class="divider"><span>OR JOIN</span></div>

  <div class="join-row">
    <input class="join-input" id="lf-join" placeholder="Enter room code"/>
    <button class="btn-join" onclick="joinRoom()">JOIN →</button>
  </div>
</div>

<div id="room" class="screen">
  <div class="topbar">
    <div class="tb-l">
      <div class="live-dot"></div>
      <div class="tb-title">VIDCREW <em>MEET</em></div>
    </div>
    <div class="tb-r">
      <div class="rec-pill" id="rec-pill"><div class="reddot"></div>REC</div>
      <div class="tb-timer" id="timer">00:00</div>
      <div class="tb-code" onclick="showInvite()"><strong id="tb-code"></strong></div>
      <div class="pcount" id="pcount">👥 1</div>
    </div>
  </div>

  <div class="vzone">
    <div class="vgrid g1" id="vgrid">
      <div class="vtile local" id="local-tile">
        <video id="local-vid" autoplay playsinline muted></video>
        <div class="vtile-av hidden" id="local-av" style="background:var(--red)"></div>
        <div class="vtile-lbl">
          <span id="local-lbl">You</span>
          <span class="rchip client" id="local-chip">client</span>
        </div>
        <div class="vtile-muted" id="local-muted">🔇</div>
      </div>
    </div>
    <div class="sharebar" id="sharebar">🖥️ <span id="share-txt">Screen active</span></div>
  </div>

  <div class="controls">
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button class="cbtn" id="mic-btn" onclick="toggleMic()">🎙️</button>
      <span class="ctrl-lbl">Mic</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button class="cbtn" id="cam-btn" onclick="toggleCam()">📷</button>
      <span class="ctrl-lbl">Camera</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button class="cbtn" id="scr-btn" onclick="toggleScreen()">🖥️</button>
      <span class="ctrl-lbl">Share</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button class="cbtn" id="rec-btn" onclick="toggleRec()">⏺️</button>
      <span class="ctrl-lbl">Record</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;">
      <button class="cbtn" id="chat-btn" onclick="togglePanel('chat')">💬</button>
      <div class="ubadge" id="ubadge">0</div>
      <span class="ctrl-lbl">Chat</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button class="cbtn" id="ppl-btn" onclick="togglePanel('people')">👥</button>
      <span class="ctrl-lbl">People</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button class="cbtn end" onclick="endCall()">📵</button>
      <span class="ctrl-lbl">End</span>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<div class="panel" id="chat-panel">
  <div class="phandle"></div>
  <div class="ptop">
    <h4>💬 CHAT</h4>
    <button class="pclose" onclick="closeAllPanels()">✕</button>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-input-row">
    <textarea class="chat-ta" id="chat-ta" placeholder="Message everyone..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    <button class="chat-send" onclick="sendMsg()">➤</button>
  </div>
</div>

<div class="panel" id="people-panel">
  <div class="phandle"></div>
  <div class="ptop">
    <h4>👥 PEOPLE</h4>
    <button class="pclose" onclick="closeAllPanels()">✕</button>
  </div>
  <div class="plist" id="plist"></div>
</div>

<div class="inv-modal" id="inv-modal">
  <div class="inv-box">
    <h3>📨 INVITE TO ROOM</h3>
    <div class="inv-code" id="modal-code"></div>
    <div class="inv-link" id="inv-link"></div>
    <div class="inv-btns">
      <button class="inv-btn" onclick="copyText(document.getElementById('modal-code').textContent)">📋 Copy Code</button>
      <button class="inv-btn red" onclick="closeInvite()">Close</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
const ICE=[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'},
];
const PCFG={host:'0.peerjs.com',secure:true,port:443,path:'/',config:{iceServers:ICE}};

let peer=null,localStream=null,screenStream=null,recorder=null,recChunks=[];
let micOn=true,camOn=true,sharing=false,recOn=false;
let unread=0,activePanel=null,timerSec=0,timerInt=null;
let myName='You',myRole='client',myCode='';
const peers=new Map(),screenCalls=new Map();

async function requestCam(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    const v=document.getElementById('prev-vid');
    v.srcObject=localStream;v.play().catch(()=>{});
    document.getElementById('cam-placeholder').style.display='none';
  }catch(e){
    try{
      localStream=await navigator.mediaDevices.getUserMedia({audio:true});
      document.getElementById('cam-placeholder').innerHTML='<span>🎙️</span><p>Audio only</p>';
    }catch(e2){
      document.getElementById('cam-placeholder').innerHTML='<span>⚠️</span><p>No camera or mic found</p>';
    }
  }
}

function genCode(){return 'VC-2026-'+Math.floor(1000+Math.random()*9000);}
function codeToId(c){return c.replace(/-/g,'').toLowerCase();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyText(t){navigator.clipboard?.writeText(t).then(()=>toast('✅ Copied!')).catch(()=>toast('Code: '+t));}
let toastT;
function toast(msg,dur=3000){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),dur);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function createRoom(){
  myName=document.getElementById('lf-name').value.trim()||'Host';
  myCode=genCode();
  document.getElementById('code-val').textContent=myCode;
  document.getElementById('code-box').style.display='block';
  toast('Room created! Share the code 🎉');
  initPeer(codeToId(myCode),myCode,true);
}
function joinRoom(){
  myName=document.getElementById('lf-name').value.trim()||'Guest';
  let raw=document.getElementById('lf-join').value.trim().toUpperCase();
  if(!raw){toast('⚠️ Enter a room code');return;}
  if(/^\d{4}$/.test(raw))raw='VC-2026-'+raw;
  else if(!raw.startsWith('VC-'))raw='VC-'+raw;
  myCode=raw;toast('Connecting…');
  initPeer('g-'+Date.now(),myCode,false,codeToId(myCode));
}

function initPeer(myId,code,isHost,hostId){
  peer=new Peer(myId,PCFG);
  peer.on('open',()=>{
    enterRoom(code);
    if(!isHost&&hostId)connectTo(hostId);
  });
  peer.on('error',err=>{
    if(err.type==='unavailable-id'&&!isHost){peer.destroy();initPeer('g-'+Date.now(),code,false,hostId);return;}
    if(!document.getElementById('room').classList.contains('active'))enterRoom(code);
    toast('⚠️ '+err.type);
  });
  peer.on('call',call=>{
    if(call.metadata?.type==='screen'){
      call.answer();
      call.on('stream',s=>showRemoteScreen(s,call.metadata.name||'Peer'));
      call.on('close',hideRemoteScreen);
      return;
    }
    call.answer(localStream);
    handleCall(call);
  });
  peer.on('connection',conn=>{
    setupConn(conn);
    conn.on('open',()=>conn.send({type:'hello',name:myName,role:myRole}));
  });
}

function connectTo(hostId){
  const conn=peer.connect(hostId,{reliable:true});
  setupConn(conn);
  conn.on('open',()=>{
    conn.send({type:'hello',name:myName,role:myRole});
    if(localStream){const call=peer.call(hostId,localStream);handleCall(call,hostId);}
  });
}

function setupConn(conn){
  if(!peers.has(conn.peer))peers.set(conn.peer,{});
  conn.on('open',()=>{peers.get(conn.peer).conn=conn;});
  conn.on('data',data=>{
    const e=peers.get(conn.peer)||{};
    if(data.type==='hello'){
      e.name=data.name;e.role=data.role;peers.set(conn.peer,e);
      updatePeople();updatePCount();sysMsg(data.name+' joined');
      conn.send({type:'hello',name:myName,role:myRole});
    }else if(data.type==='chat'){
      showMsg(data.name,data.role,data.text,false);
      if(activePanel!=='chat'){unread++;showUnread();}
    }else if(data.type==='screen_on'){
      document.getElementById('share-txt').textContent=(e.name||'Peer')+' is sharing';
      document.getElementById('sharebar').classList.add('on');
    }else if(data.type==='screen_off'){
      hideRemoteScreen();
    }else if(data.type==='mic_off'){
      document.getElementById('tile-'+conn.peer)?.querySelector('.vtile-muted')?.classList.add('show');
    }else if(data.type==='mic_on'){
      document.getElementById('tile-'+conn.peer)?.querySelector('.vtile-muted')?.classList.remove('show');
    }
  });
  conn.on('close',()=>{
    const e=peers.get(conn.peer);
    sysMsg((e?.name||'Someone')+' left');
    removeTile(conn.peer);peers.delete(conn.peer);updatePeople();updatePCount();
  });
}

function handleCall(call,pid){
  call.on('stream',stream=>{
    const p=pid||call.peer;
    const e=peers.get(p)||{};e.call=call;e.stream=stream;peers.set(p,e);
    addTile(p,stream,e.name||'Peer',e.role||'client');
    updateGrid();updatePCount();
  });
  call.on('close',()=>{removeTile(call.peer);updateGrid();});
}

function enterRoom(code){
  showScreen('room');myCode=code;
  document.getElementById('tb-code').textContent=code;
  document.getElementById('modal-code').textContent=code;
  document.getElementById('local-lbl').textContent=myName;
  const chip=document.getElementById('local-chip');chip.textContent=myRole;chip.className='rchip '+myRole;
  document.getElementById('local-av').textContent=myName[0]?.toUpperCase()||'?';
  if(localStream&&camOn){const v=document.getElementById('local-vid');v.srcObject=localStream;v.play().catch(()=>{});}
  else{document.getElementById('local-vid').classList.add('hidden');document.getElementById('local-av').classList.remove('hidden');}
  if(!micOn){document.getElementById('local-muted').classList.add('show');document.getElementById('mic-btn').classList.add('off');}
  if(!camOn)document.getElementById('cam-btn').classList.add('off');
  startTimer();updatePeople();
  sysMsg('You joined · Share the code to invite others');
}

const COLORS=['#E63B2E','#C9A84C','#2ECC71','#3B8BEB','#9B59B6','#E67E22'];
let ci=0;
function addTile(pid,stream,name,role){
  if(document.getElementById('tile-'+pid)){document.querySelector('#tile-'+pid+' video').srcObject=stream;return;}
  const col=COLORS[ci++%COLORS.length];
  const t=document.createElement('div');t.className='vtile';t.id='tile-'+pid;
  const hasVid=stream.getVideoTracks().length>0;
  t.innerHTML=`<video autoplay playsinline ${hasVid?'':'class="hidden"'}></video>
    <div class="vtile-av${hasVid?' hidden':''}" style="background:${col}">${name[0]?.toUpperCase()||'?'}</div>
    <div class="vtile-lbl"><span>${esc(name)}</span><span class="rchip ${role}">${role}</span></div>
    <div class="vtile-muted">🔇</div>`;
  const vid=t.querySelector('video');vid.srcObject=stream;vid.play().catch(()=>{});
  document.getElementById('vgrid').appendChild(t);
}
function removeTile(pid){document.getElementById('tile-'+pid)?.remove();updateGrid();}
function updateGrid(){
  const g=document.getElementById('vgrid');
  const n=g.querySelectorAll('.vtile').length;
  g.className='vgrid '+(n<=1?'g1':n===2?'g2':n===3?'g3':'g4');
}
function updatePCount(){document.getElementById('pcount').textContent='👥 '+(peers.size+1);}

function showRemoteScreen(stream,name){
  let tile=document.getElementById('remote-scr');
  if(!tile){
    tile=document.createElement('div');tile.className='vtile scrtile';tile.id='remote-scr';tile.style.gridColumn='1/-1';
    tile.innerHTML=`<video autoplay playsinline style="width:100%;height:100%;object-fit:contain;"></video>
      <div class="vtile-lbl">🖥️ <span>${esc(name)}'s Screen</span></div>`;
    document.getElementById('vgrid').prepend(tile);updateGrid();
  }
  const v=tile.querySelector('video');v.srcObject=stream;v.play().catch(()=>{});
  document.getElementById('sharebar').classList.add('on');
  toast('🖥️ '+name+' is sharing their screen');
}
function hideRemoteScreen(){
  document.getElementById('remote-scr')?.remove();updateGrid();
  document.getElementById('sharebar').classList.remove('on');
}

function toggleMic(){
  micOn=!micOn;
  localStream?.getAudioTracks().forEach(t=>t.enabled=micOn);
  document.getElementById('mic-btn').textContent=micOn?'🎙️':'🔇';
  document.getElementById('mic-btn').classList.toggle('off',!micOn);
  document.getElementById('local-muted').classList.toggle('show',!micOn);
  broadcast({type:micOn?'mic_on':'mic_off'});
}
function toggleCam(){
  camOn=!camOn;
  localStream?.getVideoTracks().forEach(t=>t.enabled=camOn);
  document.getElementById('cam-btn').classList.toggle('off',!camOn);
  const v=document.getElementById('local-vid'),a=document.getElementById('local-av');
  camOn?(v.classList.remove('hidden'),a.classList.add('hidden')):(v.classList.add('hidden'),a.classList.remove('hidden'));
}

async function toggleScreen(){
  if(sharing){stopScreen();return;}
  if(window.AndroidBridge){
    window._onScreenDenied=()=>toast('❌ Screen share denied');
    window._onScreenStopped=()=>stopScreen();
    window._onScreenStarted=(w,h)=>{
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      window._onScreenFrame=(b64)=>{
        const img=new Image();
        img.onload=()=>ctx.drawImage(img,0,0,w,h);
        img.src='data:image/jpeg;base64,'+b64;
      };
      const stream=canvas.captureStream(10);
      startSharing(stream);
    };
    AndroidBridge.startCapture();
    return;
  }
  if(navigator.mediaDevices?.getDisplayMedia){
    try{
      const stream=await navigator.mediaDevices.getDisplayMedia({video:{cursor:'always'},audio:true});
      startSharing(stream);return;
    }catch(e){
      if(e.name==='NotAllowedError'){toast('❌ Permission denied');return;}
      toast('❌ Not available');return;
    }
  }
  toast('❌ Screen share not supported');
}

function startSharing(stream){
  screenStream=stream;sharing=true;
  const track=screenStream.getVideoTracks()[0];
  const tile=document.createElement('div');tile.className='vtile scrtile';tile.id='scr-tile';tile.style.gridColumn='1/-1';
  tile.innerHTML=`<video id="scr-vid" autoplay playsinline style="width:100%;height:100%;object-fit:contain;"></video>
    <div class="vtile-lbl">🖥️ <span>Your Screen</span></div>
    <button class="stop-scr" onclick="stopScreen()">■ Stop</button>`;
  document.getElementById('vgrid').prepend(tile);
  const v=document.getElementById('scr-vid');v.srcObject=screenStream;v.play().catch(()=>{});
  updateGrid();
  document.getElementById('scr-btn').classList.add('on');
  document.getElementById('share-txt').textContent='You are sharing your screen';
  document.getElementById('sharebar').classList.add('on');
  toast('🖥️ Sharing started');
  peers.forEach((e,pid)=>{
    if(!peer)return;
    try{const sc=peer.call(pid,screenStream,{metadata:{type:'screen',name:myName}});screenCalls.set(pid,sc);}
    catch(err){console.warn('[screen call]',err);}
  });
  broadcast({type:'screen_on',name:myName});
  if(track)track.addEventListener('ended',stopScreen);
}

function stopScreen(){
  if(!sharing)return;sharing=false;
  if(window.AndroidBridge){try{AndroidBridge.stopCapture();}catch(e){}}
  window._onScreenFrame=null;
  screenStream?.getTracks().forEach(t=>t.stop());screenStream=null;
  screenCalls.forEach(c=>{try{c.close();}catch(e){}});screenCalls.clear();
  document.getElementById('scr-tile')?.remove();updateGrid();
  document.getElementById('scr-btn').classList.remove('on');
  document.getElementById('sharebar').classList.remove('on');
  toast('Screen share stopped');broadcast({type:'screen_off'});
}

function toggleRec(){recOn?stopRec():startRec();}
function startRec(){
  if(!localStream){toast('No stream to record');return;}
  recChunks=[];
  const mt=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm',''].find(t=>{try{return MediaRecorder.isTypeSupported(t);}catch(e){return false;}});
  recorder=new MediaRecorder(localStream,mt?{mimeType:mt}:{});
  recorder.ondataavailable=e=>e.data.size>0&&recChunks.push(e.data);
  recorder.onstop=saveRec;recorder.start(1000);recOn=true;
  document.getElementById('rec-btn').classList.add('off');
  document.getElementById('rec-pill').classList.add('on');
  toast('⏺️ Recording started');
}
function stopRec(){recorder?.stop();recOn=false;document.getElementById('rec-btn').classList.remove('off');document.getElementById('rec-pill').classList.remove('on');}
function saveRec(){
  const blob=new Blob(recChunks,{type:'video/webm'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`vidcrew-${myCode}-${Date.now()}.webm`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  toast('✅ Check Downloads folder!');
}

function togglePanel(name){
  if(activePanel===name){closeAllPanels();return;}
  closeAllPanels();activePanel=name;
  document.getElementById(name+'-panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.getElementById(name+'-btn')?.classList.add('on');
  if(name==='chat'){unread=0;document.getElementById('ubadge').classList.remove('show');setTimeout(()=>document.getElementById('chat-ta').focus(),300);}
  if(name==='people')updatePeople();
}
function closeAllPanels(){
  activePanel=null;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('chat-btn').classList.remove('on');
  document.getElementById('ppl-btn').classList.remove('on');
}
function endCall(){
  if(recOn)stopRec();
  localStream?.getTracks().forEach(t=>t.stop());
  screenStream?.getTracks().forEach(t=>t.stop());
  clearInterval(timerInt);
  peers.forEach(({conn,call})=>{try{conn?.close();call?.close();}catch(e){}});
  peer?.destroy();location.reload();
}

function sendMsg(){
  const ta=document.getElementById('chat-ta');
  const text=ta.value.trim();if(!text)return;
  showMsg(myName,myRole,text,true);
  broadcast({type:'chat',name:myName,role:myRole,text});
  ta.value='';ta.style.height='auto';
}
function showMsg(name,role,text,isMe){
  const el=document.createElement('div');el.className='cmsg'+(isMe?' me':'');
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  el.innerHTML=(isMe?`<div class="cmeta"><span>${t}</span></div>`:`<div class="cmeta"><span class="csender">${esc(name)}</span><span>${t}</span></div>`)+`<div class="cbubble">${esc(text)}</div>`;
  const m=document.getElementById('chat-msgs');m.appendChild(el);m.scrollTop=m.scrollHeight;
}
function sysMsg(text){
  const el=document.createElement('div');el.className='cmsg sys';
  el.innerHTML=`<div class="cbubble">${esc(text)}</div>`;
  const m=document.getElementById('chat-msgs');m.appendChild(el);m.scrollTop=m.scrollHeight;
}
function showUnread(){const b=document.getElementById('ubadge');b.textContent=unread;b.classList.add('show');}
function broadcast(data){peers.forEach(({conn})=>{try{conn?.send(data);}catch(e){}});}

function updatePeople(){
  const l=document.getElementById('plist');l.innerHTML='';
  const me=document.createElement('div');me.className='pitem';
  me.innerHTML=`<div class="pav" style="background:var(--red)">${myName[0]?.toUpperCase()||'?'}</div>
    <div class="pinfo"><div class="pname">${esc(myName)}</div><div class="prole">${myRole}</div></div>
    <span class="youtag">You</span>`;
  l.appendChild(me);
  peers.forEach(e=>{
    if(!e.name)return;
    const el=document.createElement('div');el.className='pitem';
    el.innerHTML=`<div class="pav" style="background:var(--blue)">${e.name[0]?.toUpperCase()||'?'}</div>
      <div class="pinfo"><div class="pname">${esc(e.name)}</div><div class="prole">${e.role||'—'}</div></div>`;
    l.appendChild(el);
  });
}

function startTimer(){
  timerInt=setInterval(()=>{
    timerSec++;
    const m=String(Math.floor(timerSec/60)).padStart(2,'0');
    const s=String(timerSec%60).padStart(2,'0');
    document.getElementById('timer').textContent=m+':'+s;
  },1000);
}

  const link=`https://hulklife04-cloud.github.io/vidcrew-/vidcrew-meet.html?room=${myCode}`;
  document.getElementById('modal-code').textContent=myCode;

  document.getElementById('inv-modal').classList.add('show');
}
function closeInvite(){document.getElementById('inv-modal').classList.remove('show');}
