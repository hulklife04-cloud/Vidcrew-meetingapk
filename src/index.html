<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#E63B2E"/>
<title></title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root{
  --red:#E63B2E;--gold:#C9A84C;--green:#2ECC71;--blue:#3B8BEB;
  --bg:#070707;--bg2:#0f0f10;--bg3:#161618;--bg4:#1e1e21;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0f0f2;--muted:rgba(240,240,242,0.45);--muted2:rgba(240,240,242,0.2);
  --red-glow:rgba(230,59,46,0.18);--gold-glow:rgba(201,168,76,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}

/* SCREENS */
.screen{display:none;width:100%;height:100%;flex-direction:column;}
.screen.active{display:flex;}

/* LOBBY */
#lobby{
  width:100%;height:100%;overflow-y:auto;
  padding:16px 16px calc(env(safe-area-inset-bottom)+16px);
  gap:12px;flex-direction:column;align-items:stretch;background:var(--bg);
}
#lobby::-webkit-scrollbar{display:none;}

/* LOBBY HEADER */
.lobby-header{display:flex;align-items:center;gap:12px;padding:4px 0;}
.vc-logo{
  width:44px;height:44px;background:var(--red);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;
  box-shadow:0 0 24px rgba(230,59,46,.35),0 2px 8px rgba(0,0,0,.5);
  flex-shrink:0;position:relative;overflow:hidden;
}
.vc-logo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
}
.lobby-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;line-height:1;}
.lobby-title span{color:var(--red);}
.lobby-sub{font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:3px;text-transform:uppercase;}

/* CAMERA PREVIEW */
.cam-box{
  width:100%;height:180px;background:var(--bg3);
  border-radius:16px;overflow:hidden;position:relative;
  border:1px solid var(--border2);
  box-shadow:0 4px 24px rgba(0,0,0,.4);
}
.cam-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.cam-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,var(--bg3),var(--bg4));
}
.cam-placeholder span{font-size:32px;opacity:.6;}
.cam-placeholder p{font-size:12px;color:var(--muted);text-align:center;}
.allow-btn{
  background:var(--red);color:white;border:none;border-radius:8px;
  padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer;
  letter-spacing:.5px;margin-top:2px;
  box-shadow:0 2px 12px rgba(230,59,46,.4);
}
.cam-lbl{
  position:absolute;top:10px;left:10px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:6px;
  padding:2px 8px;font-size:10px;letter-spacing:1px;color:var(--muted);
}
.cam-ctrls{position:absolute;bottom:10px;right:10px;display:flex;gap:6px;}
.cctrl{
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  border:1px solid var(--border2);color:white;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.cctrl.off{background:rgba(230,59,46,.6);border-color:var(--red);}

/* FORM ELEMENTS */
.flabel{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block;}
.finput{
  width:100%;background:var(--bg3);
  border:1.5px solid var(--border2);border-radius:12px;
  padding:13px 14px;color:var(--text);font-size:14px;
  font-family:'DM Sans',sans-serif;font-weight:500;
  transition:border-color .2s;
}
.finput:focus{border-color:rgba(230,59,46,.5);outline:none;background:var(--bg4);}
.finput::placeholder{color:var(--muted2);}

/* ROLE GRID */
.role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.role-card{
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;
  transition:all .2s;
}
.role-card.active{
  border-color:var(--red);background:var(--red-glow);
  box-shadow:0 0 16px rgba(230,59,46,.15);
}
.role-icon{font-size:20px;display:block;margin-bottom:4px;}
.role-name{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.role-card.active .role-name{color:var(--red);}

/* BUTTONS */
.btn-red{
  width:100%;background:var(--red);border:none;border-radius:14px;
  padding:15px;color:white;font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:3px;cursor:pointer;
  box-shadow:0 4px 20px rgba(230,59,46,.35);
  transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.btn-red::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 50%);
}
.btn-red:active{transform:scale(.98);box-shadow:0 2px 12px rgba(230,59,46,.3);}

/* CODE BOX */
.code-box{
  display:none;background:var(--bg3);
  border:1px solid rgba(201,168,76,.25);border-radius:12px;
  padding:12px 14px;position:relative;overflow:hidden;
}
.code-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.code-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:2px;opacity:.7;}
.code-val{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:6px;color:var(--gold);}
.code-copy{font-size:11px;color:var(--muted);margin-top:4px;cursor:pointer;display:flex;align-items:center;gap:4px;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:10px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;}

/* JOIN ROW */
.join-row{display:flex;gap:8px;}
.join-input{
  flex:1;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:12px;padding:13px 14px;color:var(--text);
  font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;
  letter-spacing:1px;
}
.join-input:focus{border-color:rgba(230,59,46,.5);outline:none;}
.join-input::placeholder{color:var(--muted2);font-weight:400;letter-spacing:0;}
.btn-join{
  background:var(--bg4);border:1.5px solid var(--border2);
  border-radius:12px;padding:13px 18px;color:var(--text);
  font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
  letter-spacing:.5px;
}

/* ROOM SCREEN */
#room{height:100%;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--bg2);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.tb-l{display:flex;align-items:center;gap:8px;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--text);}
.tb-title em{color:var(--red);font-style:normal;}
.tb-r{display:flex;align-items:center;gap:6px;}
.tb-timer{
  font-family:'Bebas Neue',sans-serif;font-size:15px;
  color:var(--muted);letter-spacing:1px;
}
.tb-code{
  background:var(--bg3);border:1px solid rgba(201,168,76,.2);
  border-radius:6px;padding:3px 9px;
  font-size:10px;color:var(--gold);font-family:'Bebas Neue',sans-serif;
  letter-spacing:2px;cursor:pointer;
}
.pcount{
  background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.2);
  border-radius:6px;padding:3px 8px;font-size:10px;color:var(--green);font-weight:600;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.rec-pill{
  display:none;align-items:center;gap:4px;
  background:rgba(230,59,46,.1);border:1px solid rgba(230,59,46,.25);
  border-radius:20px;padding:2px 10px;font-size:10px;font-weight:600;
}
.rec-pill.on{display:flex;}
.reddot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* VIDEO ZONE */
.vzone{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.vgrid{
  flex:1;display:grid;gap:3px;padding:3px;
  min-height:0;overflow:hidden;background:var(--bg);
}
.vgrid.g1{grid-template-columns:1fr;}
.vgrid.g2{grid-template-columns:1fr 1fr;}
.vgrid.g3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.vgrid.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.vtile{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;min-height:0;
}
.vtile.local{border-color:rgba(230,59,46,.2);}
.vtile video{width:100%;height:100%;object-fit:cover;}
.vtile video.hidden{display:none;}
.vtile-av{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:26px;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.vtile-av.hidden{display:none;}
.vtile-lbl{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  padding:16px 8px 6px;
  display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;
}
.vtile-muted{
  position:absolute;top:8px;right:8px;
  background:rgba(230,59,46,.9);border-radius:50%;
  width:22px;height:22px;display:none;align-items:center;justify-content:center;font-size:10px;
}
.vtile-muted.show{display:flex;}
.rchip{
  font-size:9px;padding:1px 5px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.5px;font-weight:700;
}
.rchip.client{background:rgba(201,168,76,.2);color:var(--gold);}
.rchip.editor{background:rgba(59,139,235,.2);color:var(--blue);}
.rchip.admin{background:rgba(230,59,46,.2);color:var(--red);}
.scrtile video{object-fit:contain!important;}
.stop-scr{
  position:absolute;top:8px;right:8px;background:var(--red);
  color:white;border:none;border-radius:6px;padding:4px 10px;
  font-size:11px;font-weight:700;cursor:pointer;
}
.sharebar{
  display:none;align-items:center;justify-content:center;gap:8px;
  padding:4px 12px;background:rgba(230,59,46,.1);
  border-top:1px solid rgba(230,59,46,.2);
  font-size:11px;color:var(--red);font-weight:600;flex-shrink:0;
}
.sharebar.on{display:flex;}

/* CONTROLS */
.controls{
  display:flex;flex-direction:row;align-items:center;justify-content:space-around;
  padding:10px 8px calc(env(safe-area-inset-bottom)+10px);
  background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;
}
.ctrl-item{display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;}
.cbtn{
  width:46px;height:46px;border-radius:13px;
  border:1px solid var(--border2);background:var(--bg3);
  color:var(--text);font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.cbtn:active{transform:scale(.93);}
.cbtn.off{background:rgba(230,59,46,.12);border-color:rgba(230,59,46,.4);color:var(--red);}
.cbtn.on{background:rgba(46,204,113,.12);border-color:rgba(46,204,113,.35);}
.cbtn.end{background:var(--red);border-color:var(--red);box-shadow:0 2px 12px rgba(230,59,46,.35);}
.ctrl-lbl{font-size:8px;color:var(--muted);letter-spacing:.3px;font-weight:500;}
.ubadge{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);border-radius:50%;
  width:14px;height:14px;font-size:8px;
  display:none;align-items:center;justify-content:center;
  border:1.5px solid var(--bg2);
}
.ubadge.show{display:flex;}

/* OVERLAY + PANELS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;backdrop-filter:blur(2px);}
.overlay.show{display:block;}
.panel{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg2);border-top:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:72vh;display:flex;flex-direction:column;
}
.panel.open{transform:translateY(0);}
.phandle{width:36px;height:4px;background:var(--border2);border-radius:4px;margin:10px auto 0;}
.ptop{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 10px;border-bottom:1px solid var(--border);
}
.ptop h4{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--text);}
.pclose{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg3);}

/* CHAT */
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.chat-msgs::-webkit-scrollbar{display:none;}
.cmsg{display:flex;flex-direction:column;gap:2px;max-width:85%;}
.cmsg.me{align-self:flex-end;}
.cmsg.sys{align-self:center;max-width:100%;}
.cmeta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-bottom:1px;}
.csender{font-weight:700;color:var(--text);}
.cbubble{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;border-top-left-radius:4px;
  padding:8px 12px;font-size:13px;line-height:1.45;
}
.cmsg.me .cbubble{
  background:rgba(230,59,46,.15);border-color:rgba(230,59,46,.25);
  border-top-right-radius:4px;border-top-left-radius:12px;
}
.cmsg.sys .cbubble{background:transparent;border:none;font-size:11px;color:var(--muted);text-align:center;}
.chat-input-row{
  display:flex;gap:8px;padding:10px 12px;
  border-top:1px solid var(--border);
  padding-bottom:calc(env(safe-area-inset-bottom)+10px);
}
.chat-ta{
  flex:1;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:10px;padding:10px 12px;color:var(--text);
  font-size:13px;font-family:'DM Sans',sans-serif;resize:none;
  height:40px;max-height:100px;
}
.chat-ta:focus{outline:none;border-color:rgba(230,59,46,.4);}
.chat-send{
  background:var(--red);border:none;border-radius:10px;
  padding:0 14px;color:white;font-size:16px;cursor:pointer;
  box-shadow:0 2px 10px rgba(230,59,46,.3);
}

/* PEOPLE */
.plist{padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.plist::-webkit-scrollbar{display:none;}
.pitem{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--bg3);border-radius:12px;
  border:1px solid var(--border);
}
.pav{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:15px;flex-shrink:0;
}
.pinfo{flex:1;}
.pname{font-size:13px;font-weight:600;}
.prole{font-size:11px;color:var(--muted);text-transform:capitalize;}
.youtag{font-size:9px;background:var(--red-glow);color:var(--red);border-radius:4px;padding:2px 7px;font-weight:700;border:1px solid rgba(230,59,46,.2);}

/* INVITE MODAL */
.inv-modal{
  display:none;position:fixed;inset:0;z-index:200;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
}
.inv-modal.show{display:flex;}
.inv-box{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px;padding:24px 20px;width:90%;max-width:340px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}
.inv-box h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:12px;color:var(--muted);}
.inv-code{
  font-family:'Bebas Neue',sans-serif;font-size:38px;
  letter-spacing:7px;color:var(--gold);
  text-shadow:0 0 20px rgba(201,168,76,.3);margin:6px 0;
}
.inv-link{margin-top:10px;word-break:break-all;font-size:11px;color:var(--muted);line-height:1.6;}
.inv-btns{display:flex;gap:8px;margin-top:16px;}
.inv-btn{
  flex:1;padding:11px;border-radius:10px;
  border:1.5px solid var(--border2);background:var(--bg3);
  color:var(--text);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;
}
.inv-btn.red{background:var(--red);border-color:var(--red);box-shadow:0 2px 12px rgba(230,59,46,.3);}

/* TOAST */
#toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:10px 18px;font-size:12px;font-weight:500;
  opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);
  z-index:999;white-space:nowrap;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="lobby" class="screen active">
  <div class="lobby-header">
    <div class="vc-logo">VC</div>
    <div class="lobby-title">VIDCREW <span>MEET</span><div class="lobby-sub">Real-Time Collaboration</div></div>
  </div>

  <div class="cam-box">
    <video id="prev-vid" autoplay playsinline muted></video>
    <div class="cam-placeholder" id="cam-placeholder">
      <span>📷</span>
      <p>Tap to allow camera</p>
      <button class="allow-btn" onclick="requestCam()">Allow Camera</button>
    </div>
    <div class="cam-lbl">PREVIEW</div>
    <div class="cam-ctrls">
      <button class="cctrl" id="prev-mic-btn" onclick="prevToggleMic()">🎙️</button>
      <button class="cctrl" id="prev-cam-btn" onclick="prevToggleCam()">📷</button>
    </div>
  </div>

  <div>
    <label class="flabel">Your Name</label>
    <input class="finput" id="lf-name" placeholder="e.g. Romit" maxlength="24"/>
  </div>

  <div>
    <label class="flabel">Your Role</label>
    <div class="role-grid">
      <div class="role-card active" data-role="client">
        <span class="role-icon">🎬</span>
        <div class="role-name">Client</div>
      </div>
      <div class="role-card" data-role="editor">
        <span class="role-icon">✂️</span>
        <div class="role-name">Editor</div>
      </div>
      <div class="role-card" data-role="admin">
        <span class="role-icon">👑</span>
        <div class="role-name">Admin</div>
      </div>
    </div>
  </div>

  <button class="btn-red" onclick="createRoom()">⚡ CREATE NEW ROOM</button>

  <div class="code-box" id="code-box">
    <div class="code-lbl">Room Code</div>
    <div class="code-val" id="code-val"></div>
    <div class="code-copy" onclick="copyText(document.getElementById('code-val').textContent)">📋 Tap to copy</div>
  </div>

  <div class="divider"><span>or join existing</span></div>

  <div class="join-row">
    <input class="join-input" id="lf-join" placeholder="Enter room code"/>
    <button class="btn-join" onclick="joinRoom()">JOIN →</button>
  </div>
</div>

<div id="room" class="screen">
  <div class="topbar">
    <div class="tb-l">
      <div class="live-dot"></div>
      <div class="tb-title">VIDCREW <em>MEET</em></div>
    </div>
    <div class="tb-r">
      <div class="rec-pill" id="rec-pill"><div class="reddot"></div>REC</div>
      <div class="tb-timer" id="timer">00:00</div>

      <button class="inv-btn" onclick="copyText(document.getElementById('modal-code').textContent)">📋 Copy Code</button>
      <button class="inv-btn red" onclick="closeInvite()">Close</button>

<div id="toast"></div>
<script>
const ICE=[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'},
];
const PCFG={host:'0.peerjs.com',secure:true,port:443,path:'/',config:{iceServers:ICE}};

let peer=null,localStream=null,screenStream=null,recorder=null,recChunks=[];
let micOn=true,camOn=true,sharing=false,recOn=false;
let unread=0,activePanel=null,timerSec=0,timerInt=null;
let myName='You',myRole='client',myCode='';
const peers=new Map(),screenCalls=new Map();

async function requestCam(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:480},height:{ideal:360},frameRate:{ideal:15,max:20}},
      audio:{echoCancellation:true,noiseSuppression:true,sampleRate:22050}
    });
    const v=document.getElementById('prev-vid');
    v.srcObject=localStream;v.play().catch(()=>{});
    document.getElementById('cam-placeholder').style.display='none';
  }catch(e){
    try{
      localStream=await navigator.mediaDevices.getUserMedia({audio:true});
      document.getElementById('cam-placeholder').innerHTML='<span>🎙️</span><p>Audio only</p>';
    }catch(e2){
      document.getElementById('cam-placeholder').innerHTML='<span>⚠️</span><p>No camera or mic found</p>';
    }
  }
}

window.addEventListener('load',()=>{
  requestCam();
  const urlParams=new URLSearchParams(window.location.search);
  const roomParam=urlParams.get('room');
  if(roomParam){document.getElementById('lf-join').value=roomParam;toast('🔗 Room code loaded! Enter name and join.');}
  document.querySelectorAll('.role-card').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('.role-card').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');myRole=el.dataset.role;
    });
  });
});

let pMicOn=true,pCamOn=true;
function prevToggleMic(){
  pMicOn=!pMicOn;micOn=pMicOn;
  localStream?.getAudioTracks().forEach(t=>t.enabled=pMicOn);
  const b=document.getElementById('prev-mic-btn');
  b.textContent=pMicOn?'🎙️':'🔇';b.classList.toggle('off',!pMicOn);
}
function prevToggleCam(){
  pCamOn=!pCamOn;camOn=pCamOn;
  localStream?.getVideoTracks().forEach(t=>t.enabled=pCamOn);
  const b=document.getElementById('prev-cam-btn');
  b.textContent=pCamOn?'📷':'🚫';b.classList.toggle('off',!pCamOn);
}

function genCode(){return 'VC-2026-'+Math.floor(1000+Math.random()*9000);}
function codeToId(c){return c.replace(/-/g,'').toLowerCase();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyText(t){navigator.clipboard?.writeText(t).then(()=>toast('✅ Copied!')).catch(()=>toast('Code: '+t));}
let toastT;
function toast(msg,dur=3000){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),dur);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function createRoom(){
  myName=document.getElementById('lf-name').value.trim()||'Host';
  myCode=genCode();
  document.getElementById('code-val').textContent=myCode;
  document.getElementById('code-box').style.display='block';
  toast('Room created! Share the code 🎉');
  initPeer(codeToId(myCode),myCode,true);
}
function joinRoom(){
  myName=document.getElementById('lf-name').value.trim()||'Guest';
  let raw=document.getElementById('lf-join').value.trim().toUpperCase();
  if(!raw){toast('⚠️ Enter a room code');return;}
  if(/^\d{4}$/.test(raw))raw='VC-2026-'+raw;
  else if(!raw.startsWith('VC-'))raw='VC-'+raw;
  myCode=raw;toast('Connecting…');
  initPeer('g-'+Date.now(),myCode,false,codeToId(myCode));
}

function initPeer(myId,code,isHost,hostId){
  peer=new Peer(myId,PCFG);
  peer.on('open',()=>{
    enterRoom(code);
    if(!isHost&&hostId)connectTo(hostId);
  });
  peer.on('error',err=>{
    if(err.type==='unavailable-id'&&!isHost){peer.destroy();initPeer('g-'+Date.now(),code,false,hostId);return;}
    if(!document.getElementById('room').classList.contains('active'))enterRoom(code);
    toast('⚠️ '+err.type);
  });
  peer.on('call',call=>{
    if(call.metadata?.type==='screen'){
      call.answer();
      call.on('stream',s=>showRemoteScreen(s,call.metadata.name||'Peer'));
      call.on('close',hideRemoteScreen);
      return;
    }
    call.answer(localStream);
    handleCall(call);
  });
  peer.on('connection',conn=>{
    setupConn(conn);
    conn.on('open',()=>{
      conn.send({type:'hello',name:myName,role:myRole});
      const existingPeers=Array.from(peers.keys());
      if(existingPeers.length>0){conn.send({type:'peers',list:existingPeers});}
    });
  });
}

function connectTo(hostId){
  const conn=peer.connect(hostId,{reliable:true});
  setupConn(conn);
  conn.on('open',()=>{
    conn.send({type:'hello',name:myName,role:myRole});
    if(localStream){const call=peer.call(hostId,localStream);handleCall(call,hostId);}
  });
}

function setupConn(conn){
  if(!peers.has(conn.peer))peers.set(conn.peer,{});
  conn.on('open',()=>{peers.get(conn.peer).conn=conn;});
  conn.on('data',data=>{
    const e=peers.get(conn.peer)||{};
    if(data.type==='hello'){
      e.name=data.name;e.role=data.role;peers.set(conn.peer,e);
      updatePeople();updatePCount();sysMsg(data.name+' joined');
      conn.send({type:'hello',name:myName,role:myRole});
      if(localStream&&!e.call&&peer.id>conn.peer){
        const call=peer.call(conn.peer,localStream);
        handleCall(call,conn.peer);
      }
    }else if(data.type==='peers'){
      data.list.forEach(pid=>{
        if(pid!==peer.id&&!peers.has(pid)){
          const c=peer.connect(pid,{reliable:true});
          setupConn(c);
          c.on('open',()=>{
            c.send({type:'hello',name:myName,role:myRole});
            if(localStream){const call=peer.call(pid,localStream);handleCall(call,pid);}
          });
        }
      });
    }else if(data.type==='chat'){
      showMsg(data.name,data.role,data.text,false);
      if(activePanel!=='chat'){unread++;showUnread();}
    }else if(data.type==='screen_on'){
      document.getElementById('share-txt').textContent=(e.name||'Peer')+' is sharing';
      document.getElementById('sharebar').classList.add('on');
    }else if(data.type==='screen_off'){
      hideRemoteScreen();
    }else if(data.type==='mic_off'){
      document.getElementById('tile-'+conn.peer)?.querySelector('.vtile-muted')?.classList.add('show');
    }else if(data.type==='mic_on'){
      document.getElementById('tile-'+conn.peer)?.querySelector('.vtile-muted')?.classList.remove('show');
    }
  });
  conn.on('close',()=>{
    const e=peers.get(conn.peer);
    sysMsg((e?.name||'Someone')+' left');
    removeTile(conn.peer);peers.delete(conn.peer);updatePeople();updatePCount();
  });
}

function handleCall(call,pid){
  call.on('stream',stream=>{
    const p=pid||call.peer;
    const e=peers.get(p)||{};e.call=call;e.stream=stream;peers.set(p,e);
    addTile(p,stream,e.name||'Peer',e.role||'client');
    updateGrid();updatePCount();
  });
  call.on('close',()=>{removeTile(call.peer);updateGrid();});
}

function enterRoom(code){
  showScreen('room');myCode=code;
  document.getElementById('tb-code').textContent=code;
  document.getElementById('modal-code').textContent=code;
  document.getElementById('local-lbl').textContent=myName;
  const chip=document.getElementById('local-chip');chip.textContent=myRole;chip.className='rchip '+myRole;
  document.getElementById('local-av').textContent=myName[0]?.toUpperCase()||'?';
  if(localStream&&camOn){const v=document.getElementById('local-vid');v.srcObject=localStream;v.play().catch(()=>{});}
  else{document.getElementById('local-vid').classList.add('hidden');document.getElementById('local-av').classList.remove('hidden');}
  if(!micOn){document.getElementById('local-muted').classList.add('show');document.getElementById('mic-btn').classList.add('off');}
  if(!camOn)document.getElementById('cam-btn').classList.add('off');
  startTimer();updatePeople();
  sysMsg('You joined · Share the code to invite others');
}

const COLORS=['#E63B2E','#C9A84C','#2ECC71','#3B8BEB','#9B59B6','#E67E22'];
let ci=0;
function addTile(pid,stream,name,role){
  if(document.getElementById('tile-'+pid)){document.querySelector('#tile-'+pid+' video').srcObject=stream;return;}
  const col=COLORS[ci++%COLORS.length];
  const t=document.createElement('div');t.className='vtile';t.id='tile-'+pid;
  const hasVid=stream.getVideoTracks().length>0;
  t.innerHTML=`<video autoplay playsinline ${hasVid?'':'class="hidden"'}></video>
    <div class="vtile-av${hasVid?' hidden':''}" style="background:${col}">${name[0]?.toUpperCase()||'?'}</div>
    <div class="vtile-lbl"><span>${esc(name)}</span><span class="rchip ${role}">${role}</span></div>
    <div class="vtile-muted">🔇</div>`;
  const vid=t.querySelector('video');vid.srcObject=stream;vid.play().catch(()=>{});
  document.getElementById('vgrid').appendChild(t);
}
function removeTile(pid){document.getElementById('tile-'+pid)?.remove();updateGrid();}
function updateGrid(){
  const g=document.getElementById('vgrid');
  const n=g.querySelectorAll('.vtile').length;
  g.className='vgrid '+(n<=1?'g1':n===2?'g2':n===3?'g3':'g4');
}
function updatePCount(){document.getElementById('pcount').textContent='👥 '+(peers.size+1);}

function showRemoteScreen(stream,name){
  let tile=document.getElementById('remote-scr');
  if(!tile){
    tile=document.createElement('div');tile.className='vtile scrtile';tile.id='remote-scr';tile.style.gridColumn='1/-1';
    tile.innerHTML=`<video autoplay playsinline style="width:100%;height:100%;object-fit:contain;"></video>
      <div class="vtile-lbl">🖥️ <span>${esc(name)}'s Screen</span></div>`;
    document.getElementById('vgrid').prepend(tile);updateGrid();
  }
  const v=tile.querySelector('video');v.srcObject=stream;v.play().catch(()=>{});
  document.getElementById('sharebar').classList.add('on');
  toast('🖥️ '+name+' is sharing their screen');
}
function hideRemoteScreen(){
  document.getElementById('remote-scr')?.remove();updateGrid();
  document.getElementById('sharebar').classList.remove('on');
}

function toggleMic(){
  micOn=!micOn;
  localStream?.getAudioTracks().forEach(t=>t.enabled=micOn);
  document.getElementById('mic-btn').textContent=micOn?'🎙️':'🔇';
  document.getElementById('mic-btn').classList.toggle('off',!micOn);
  document.getElementById('local-muted').classList.toggle('show',!micOn);
  broadcast({type:micOn?'mic_on':'mic_off'});
}
function toggleCam(){
  camOn=!camOn;
  localStream?.getVideoTracks().forEach(t=>t.enabled=camOn);
  document.getElementById('cam-btn').classList.toggle('off',!camOn);
  const v=document.getElementById('local-vid'),a=document.getElementById('local-av');
  camOn?(v.classList.remove('hidden'),a.classList.add('hidden')):(v.classList.add('hidden'),a.classList.remove('hidden'));
}

async function toggleScreen(){
  if(sharing){stopScreen();return;}
  if(window.AndroidBridge){
    window._onScreenDenied=()=>toast('❌ Screen share denied');
    window._onScreenStopped=()=>stopScreen();
    window._onScreenStarted=(w,h)=>{
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      window._onScreenFrame=(b64)=>{
        const img=new Image();
        img.onload=()=>ctx.drawImage(img,0,0,w,h);
        img.src='data:image/jpeg;base64,'+b64;
      };
      const stream=canvas.captureStream(10);
      startSharing(stream);
    };
    AndroidBridge.startCapture();return;
  }
  if(navigator.mediaDevices?.getDisplayMedia){
    try{
      const stream=await navigator.mediaDevices.getDisplayMedia({video:{cursor:'always'},audio:true});
      startSharing(stream);return;
    }catch(e){
      if(e.name==='NotAllowedError'){toast('❌ Permission denied');return;}
      toast('❌ Not available');return;
    }
  }
  toast('❌ Screen share not supported');
}

function startSharing(stream){
  screenStream=stream;sharing=true;
  const track=screenStream.getVideoTracks()[0];
  const tile=document.createElement('div');tile.className='vtile scrtile';tile.id='scr-tile';tile.style.gridColumn='1/-1';
  tile.innerHTML=`<video id="scr-vid" autoplay playsinline style="width:100%;height:100%;object-fit:contain;"></video>
    <div class="vtile-lbl">🖥️ <span>Your Screen</span></div>
    <button class="stop-scr" onclick="stopScreen()">■ Stop</button>`;
  document.getElementById('vgrid').prepend(tile);
  const v=document.getElementById('scr-vid');v.srcObject=screenStream;v.play().catch(()=>{});
  updateGrid();
  document.getElementById('scr-btn').classList.add('on');
  document.getElementById('share-txt').textContent='You are sharing your screen';
  document.getElementById('sharebar').classList.add('on');
  toast('🖥️ Sharing started');
  peers.forEach((e,pid)=>{
    if(!peer)return;
    try{const sc=peer.call(pid,screenStream,{metadata:{type:'screen',name:myName}});screenCalls.set(pid,sc);}
    catch(err){console.warn('[screen call]',err);}
  });
  broadcast({type:'screen_on',name:myName});
  if(track)track.addEventListener('ended',stopScreen);
}

function stopScreen(){
  if(!sharing)return;sharing=false;
  if(window.AndroidBridge){try{AndroidBridge.stopCapture();}catch(e){}}
  window._onScreenFrame=null;
  screenStream?.getTracks().forEach(t=>t.stop());screenStream=null;
  screenCalls.forEach(c=>{try{c.close();}catch(e){}});screenCalls.clear();
  document.getElementById('scr-tile')?.remove();updateGrid();
  document.getElementById('scr-btn').classList.remove('on');
  document.getElementById('sharebar').classList.remove('on');
  toast('Screen share stopped');broadcast({type:'screen_off'});
}

function toggleRec(){recOn?stopRec():startRec();}
function startRec(){
  const stream=localStream||screenStream;
  if(!stream){toast('Allow camera/mic first');return;}
  recChunks=[];
  const mt=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm',''].find(t=>{try{return MediaRecorder.isTypeSupported(t);}catch(e){return false;}});
  try{
    recorder=new MediaRecorder(stream,mt?{mimeType:mt}:{});
    recorder.ondataavailable=e=>e.data.size>0&&recChunks.push(e.data);
    recorder.onstop=saveRec;recorder.start(1000);recOn=true;
    document.getElementById('rec-btn').classList.add('off');
    document.getElementById('rec-pill').classList.add('on');
    toast('⏺️ Recording started');
  }catch(e){toast('❌ '+e.message);}
}
function stopRec(){recorder?.stop();recOn=false;document.getElementById('rec-btn').classList.remove('off');document.getElementById('rec-pill').classList.remove('on');}
function saveRec(){
  const blob=new Blob(recChunks,{type:'video/webm'});
  const file=new File([blob],`vidcrew-${Date.now()}.webm`,{type:'video/webm'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:'Vidcrew Recording'})
    .then(()=>toast('✅ Saved!'))
    .catch(()=>toast('Cancelled'));
  }else{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`vidcrew-${Date.now()}.webm`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},2000);
    toast('✅ Check Downloads!');
  }
}

function togglePanel(name){
  if(activePanel===name){closeAllPanels();return;}
  closeAllPanels();activePanel=name;
  document.getElementById(name+'-panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.getElementById(name+'-btn')?.classList.add('on');
  if(name==='chat'){unread=0;document.getElementById('ubadge').classList.remove('show');setTimeout(()=>document.getElementById('chat-ta').focus(),300);}
  if(name==='people')updatePeople();
}
function closeAllPanels(){
  activePanel=null;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('chat-btn').classList.remove('on');
  document.getElementById('ppl-btn').classList.remove('on');
}
function endCall(){
  if(recOn)stopRec();
  localStream?.getTracks().forEach(t=>t.stop());
  screenStream?.getTracks().forEach(t=>t.stop());
  clearInterval(timerInt);
  peers.forEach(({conn,call})=>{try{conn?.close();call?.close();}catch(e){}});
  peer?.destroy();location.reload();
}

function sendMsg(){
  const ta=document.getElementById('chat-ta');
  const text=ta.value.trim();if(!text)return;
  showMsg(myName,myRole,text,true);
  broadcast({type:'chat',name:myName,role:myRole,text});
  ta.value='';ta.style.height='auto';
}
function showMsg(name,role,text,isMe){
  const el=document.createElement('div');el.className='cmsg'+(isMe?' me':'');
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  el.innerHTML=(isMe?`<div class="cmeta"><span>${t}</span></div>`:`<div class="cmeta"><span class="csender">${esc(name)}</span><span>${t}</span></div>`)+`<div class="cbubble">${esc(text)}</div>`;
  const m=document.getElementById('chat-msgs');m.appendChild(el);m.scrollTop=m.scrollHeight;
}
function sysMsg(text){
  const el=document.createElement('div');el.className='cmsg sys';
  el.innerHTML=`<div class="cbubble">${esc(text)}</div>`;
  const m=document.getElementById('chat-msgs');m.appendChild(el);m.scrollTop=m.scrollHeight;
}
function showUnread(){const b=document.getElementById('ubadge');b.textContent=unread;b.classList.add('show');}
function broadcast(data){peers.forEach(({conn})=>{try{conn?.send(data);}catch(e){}});}

function updatePeople(){
  const l=document.getElementById('plist');l.innerHTML='';
  const me=document.createElement('div');me.className='pitem';
  me.innerHTML=`<div class="pav" style="background:var(--red)">${myName[0]?.toUpperCase()||'?'}</div>
    <div class="pinfo"><div class="pname">${esc(myName)}</div><div class="prole">${myRole}</div></div>
    <span class="youtag">You</span>`;
  l.appendChild(me);
  peers.forEach(e=>{
    if(!e.name)return;
    const el=document.createElement('div');el.className='pitem';
    el.innerHTML=`<div class="pav" style="background:var(--blue)">${e.name[0]?.toUpperCase()||'?'}</div>
      <div class="pinfo"><div class="pname">${esc(e.name)}</div><div class="prole">${e.role||'—'}</div></div>`;
    l.appendChild(el);
  });
}

function startTimer(){
  timerInt=setInterval(()=>{
    timerSec++;
    const m=String(Math.floor(timerSec/60)).padStart(2,'0');
    const s=String(timerSec%60).padStart(2,'0');
    document.getElementById('timer').textContent=m+':'+s;
  },1000);
}

function showInvite(){
  const link=`https://hulklife04-cloud.github.io/Vidcrew-meetingapk/?room=${myCode}`;
  document.getElementById('modal-code').textContent=myCode;
  document.getElementById('inv-link').innerHTML=`<a href="${link}" style="color:var(--gold);word-break:break-all;font-size:11px;">${link}</a><br><button onclick="copyText('${link}')" style="margin-top:8px;background:var(--red);color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;">📋 Copy Link</button>`;
  document.getElementById('inv-modal').classList.add('show');
}
function closeInvite(){document.getElementById('inv-modal').classList.remove('show');}
</script>
