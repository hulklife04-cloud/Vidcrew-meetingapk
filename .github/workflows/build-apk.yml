name: Build Vidcrew Meet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n</manifest>|' $MANIFEST
          # Fix app name showing as "html"
          sed -i 's|android:label="@string/app_name"|android:label="Vidcrew Meet"|g' $MANIFEST
          sed -i 's|android:label="@string/title_activity_main"|android:label="Vidcrew Meet"|g' $MANIFEST

      - name: Patch strings.xml
        run: |
          echo '<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Vidcrew Meet</string>
              <string name="title_activity_main">Vidcrew Meet</string>
              <string name="package_name">com.vidcrew.meet</string>
              <string name="custom_url_scheme">com.vidcrew.meet</string>
          </resources>' > android/app/src/main/res/values/strings.xml

      - name: Patch MainActivity
        run: |
          MAIN="android/app/src/main/java/com/vidcrew/meet/MainActivity.java"
          cat > $MAIN << 'EOF'
          package com.vidcrew.meet;
          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              WebView webView = getBridge().getWebView();
              WebSettings settings = webView.getSettings();
              settings.setMediaPlaybackRequiresUserGesture(false);
              settings.setAllowFileAccess(true);
              settings.setAllowContentAccess(true);
              webView.setWebChromeClient(new WebChromeClient() {
                @Override
                public void onPermissionRequest(PermissionRequest request) {
                  runOnUiThread(() -> request.grant(request.getResources()));
                }
              });
            }
          }
          EOF

      - name: Generate VC logo icon
        run: |
          sudo apt-get install -y imagemagick
          convert -size 1024x1024 xc:"#0c0c0e" \
            -fill "#E63B2E" \
            -draw "roundrectangle 50,50 974,974 160,160" \
            -font DejaVu-Sans-Bold \
            -pointsize 500 \
            -fill white \
            -gravity Center \
            -draw "text 0,0 'VC'" \
            /tmp/icon.png
          echo "Icon generated!"
          convert /tmp/icon.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert /tmp/icon.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert /tmp/icon.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert /tmp/icon.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert /tmp/icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert /tmp/icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vidcrew-meet-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
