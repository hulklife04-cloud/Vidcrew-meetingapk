name: Build Vidcrew Meet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n</manifest>|' $MANIFEST
          sed -i 's|android:theme="@style/AppTheme"|android:theme="@android:style/Theme.NoTitleBar.Fullscreen"|g' $MANIFEST

      - name: Patch strings.xml
        run: |
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Vidcrew Meet</string>
              <string name="title_activity_main">Vidcrew Meet</string>
              <string name="package_name">com.vidcrew.meet</string>
              <string name="custom_url_scheme">com.vidcrew.meet</string>
          </resources>
          EOF

      - name: Create ScreenCapturePlugin
        run: |
          mkdir -p android/app/src/main/java/com/vidcrew/meet
          cat > android/app/src/main/java/com/vidcrew/meet/ScreenCapturePlugin.java << 'EOF'
          package com.vidcrew.meet;
          import android.app.Activity;
          import android.content.Context;
          import android.graphics.Bitmap;
          import android.graphics.PixelFormat;
          import android.hardware.display.DisplayManager;
          import android.hardware.display.VirtualDisplay;
          import android.media.Image;
          import android.media.ImageReader;
          import android.media.projection.MediaProjection;
          import android.media.projection.MediaProjectionManager;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Base64;
          import android.util.DisplayMetrics;
          import android.view.WindowManager;
          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.ActivityCallback;
          import com.getcapacitor.annotation.CapacitorPlugin;
          import java.io.ByteArrayOutputStream;
          import java.nio.ByteBuffer;
          @CapacitorPlugin(name = "ScreenCapture")
          public class ScreenCapturePlugin extends Plugin {
              private MediaProjectionManager projectionManager;
              private MediaProjection mediaProjection;
              private VirtualDisplay virtualDisplay;
              private ImageReader imageReader;
              private Handler handler;
              private boolean capturing = false;
              @PluginMethod
              public void start(PluginCall call) {
                  projectionManager = (MediaProjectionManager) getContext().getSystemService(Context.MEDIA_PROJECTION_SERVICE);
                  android.content.Intent intent = projectionManager.createScreenCaptureIntent();
                  startActivityForResult(call, intent, "handleResult");
              }
              @ActivityCallback
              private void handleResult(PluginCall call, com.getcapacitor.ActivityResult result) {
                  if (result.getResultCode() == Activity.RESULT_OK) {
                      mediaProjection = projectionManager.getMediaProjection(result.getResultCode(), result.getData());
                      DisplayMetrics metrics = new DisplayMetrics();
                      ((WindowManager) getContext().getSystemService(Context.WINDOW_SERVICE)).getDefaultDisplay().getMetrics(metrics);
                      int w = metrics.widthPixels / 2;
                      int h = metrics.heightPixels / 2;
                      imageReader = ImageReader.newInstance(w, h, PixelFormat.RGBA_8888, 2);
                      virtualDisplay = mediaProjection.createVirtualDisplay("VC", w, h, metrics.densityDpi, DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR, imageReader.getSurface(), null, null);
                      capturing = true;
                      handler = new Handler(Looper.getMainLooper());
                      JSObject res = new JSObject();
                      res.put("width", w);
                      res.put("height", h);
                      call.resolve(res);
                      scheduleCapture();
                  } else { call.reject("denied"); }
              }
              private void scheduleCapture() {
                  if (!capturing) return;
                  handler.postDelayed(() -> { sendFrame(); scheduleCapture(); }, 150);
              }
              private void sendFrame() {
                  if (imageReader == null) return;
                  Image image = imageReader.acquireLatestImage();
                  if (image == null) return;
                  try {
                      Image.Plane[] planes = image.getPlanes();
                      ByteBuffer buf = planes[0].getBuffer();
                      int w = image.getWidth(), h = image.getHeight();
                      int rowPad = planes[0].getRowStride() - planes[0].getPixelStride() * w;
                      Bitmap bmp = Bitmap.createBitmap(w + rowPad / planes[0].getPixelStride(), h, Bitmap.Config.ARGB_8888);
                      bmp.copyPixelsFromBuffer(buf);
                      Bitmap cropped = Bitmap.createBitmap(bmp, 0, 0, w, h);
                      ByteArrayOutputStream baos = new ByteArrayOutputStream();
                      cropped.compress(Bitmap.CompressFormat.JPEG, 35, baos);
                      String b64 = Base64.encodeToString(baos.toByteArray(), Base64.NO_WRAP);
                      JSObject data = new JSObject();
                      data.put("frame", b64);
                      notifyListeners("frame", data);
                      bmp.recycle(); cropped.recycle();
                  } catch (Exception e) { } finally { image.close(); }
              }
              @PluginMethod
              public void stop(PluginCall call) {
                  capturing = false;
                  if (virtualDisplay != null) virtualDisplay.release();
                  if (mediaProjection != null) mediaProjection.stop();
                  if (imageReader != null) imageReader.close();
                  call.resolve();
              }
          }
          EOF

      - name: Patch MainActivity
        run: |
          cat > android/app/src/main/java/com/vidcrew/meet/MainActivity.java << 'EOF'
          package com.vidcrew.meet;
          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              registerPlugin(ScreenCapturePlugin.class);
              WebView webView = getBridge().getWebView();
              WebSettings s = webView.getSettings();
              s.setMediaPlaybackRequiresUserGesture(false);
              s.setAllowFileAccess(true);
              s.setAllowContentAccess(true);
              webView.setWebChromeClient(new WebChromeClient() {
                @Override
                public void onPermissionRequest(PermissionRequest request) {
                  runOnUiThread(() -> request.grant(request.getResources()));
                }
              });
            }
          }
          EOF

      - name: Generate VC logo
        run: |
          sudo apt-get install -y imagemagick
          convert -size 1024x1024 xc:"#0c0c0e" \
            -fill "#E63B2E" \
            -draw "roundrectangle 50,50 974,974 160,160" \
            -font DejaVu-Sans-Bold -pointsize 500 \
            -fill white -gravity Center \
            -draw "text 0,0 'VC'" \
            /tmp/icon.png
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi) size=48;; hdpi) size=72;; xhdpi) size=96;; xxhdpi) size=144;; xxxhdpi) size=192;;
            esac
            convert /tmp/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${density}/ic_launcher.png
            convert /tmp/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vidcrew-meet-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
